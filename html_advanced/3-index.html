<!DOCTYPE html> <!--Indique au navigateur que le doc utilise HTML5 -->
<html lang="en" dir="ltr"> <!--Balise racine du doc HTML-->
<!-- lang="en" indique que la langue de la page est l'angalis -->
<!-- dir="ltr" signifie que le texte est ecrit de gauche à droite -->
<head>
    <!-- La section head contient les informations sur la page
    (titre, metadonnées, liens vers CSS, etc.)
    pour cette task ekke reste vide -->
    <meta charset="utf-8">
    <!-- définiti l'encodage des caractères (accents, symboles etc)-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!--Permet d'adapter le site aux ecrans mobiles -->
    <title>Homepage - Techium</title>
    <!--Titre de la page affiché dans l'onglet du navigateur -->
    <meta name="description" content="Techium is a digital agency">
    <!-- Description de la page (utilisé par google et les moteurs de recherches )-->
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <!-- Deuxieme format de favicon -->
     <link rel="icon" type="image/png" href="./favicon.png">
</head>
<body>
    <!-- La section body contient tout ce qui sera visible
    sur la page web (texte, image, vidéos , etc.) -->
    <header>
        Header
    </header>
    <!-- Header : généralement le haut de la page (logo, menu, titre)-->
    <main>
        Main content
    </main>
    <!-- Footer : contenu principal de ka page -->
    <footer>
        Footer
    </footer>
    <!-- Footer : bas de page (copyright, liens, contact)-->
</body>
</html>
